name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options:
        - release
        - debug
      enable_debug_tools:
        description: '启用调试工具 (在生产版本中)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  direct_build:
    name: Build Android TV APK
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          cache-dependency-path: yarn.lock

      - name: Setup Java with cache
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Expo prebuild
        uses: actions/cache@v4
        with:
          path: |
            android
            ios
          key: expo-prebuild-${{ runner.os }}-${{ hashFiles('app.json', 'package.json') }}
          restore-keys: |
            expo-prebuild-${{ runner.os }}-

      - name: Install dependencies (with cache optimization)
        run: |
          # 使用并行安装和跳过可选依赖来加速
          yarn install --frozen-lockfile --prefer-offline --network-timeout 300000

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Set build environment
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            echo "BUILD_TYPE=debug" >> $GITHUB_ENV
            echo "APK_PATH=android/app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_ENV
            echo "APK_SUFFIX=debug" >> $GITHUB_ENV
          else
            echo "BUILD_TYPE=release" >> $GITHUB_ENV
            echo "APK_PATH=android/app/build/outputs/apk/release/app-release.apk" >> $GITHUB_ENV
            echo "APK_SUFFIX=release" >> $GITHUB_ENV
          fi

      - name: Enable debug tools (if requested)
        if: github.event.inputs.enable_debug_tools == 'true'
        run: |
          # 设置环境变量启用调试工具
          echo "EXPO_PUBLIC_ENABLE_DEBUG_TOOLS=true" >> .env.local
          echo "Debug tools will be enabled in this build"

      - name: Prebuild TV App (with cache check)
        run: |
          # 检查是否有缓存的 prebuild 结果
          if [ -d "android" ] && [ -f "android/settings.gradle" ]; then
            echo "Using cached prebuild results"
          else
            echo "Running prebuild..."
            yarn prebuild
          fi

      - name: Setup Gradle daemon and parallel builds
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.daemon=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.configureondemand=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.caching=true" >> ~/.gradle/gradle.properties
          echo "android.useAndroidX=true" >> ~/.gradle/gradle.properties
          echo "android.enableJetifier=true" >> ~/.gradle/gradle.properties
          # 暂时禁用配置缓存，因为与 React Native 不兼容
          echo "org.gradle.configuration-cache=false" >> ~/.gradle/gradle.properties

      - name: Build TV APK (optimized)
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            yarn build-debug
          else
            yarn build
          fi

      - name: Rename APK file
        run: |
          mkdir -p artifacts
          cp ${{ env.APK_PATH }} artifacts/orionTV.${{ steps.package-version.outputs.version }}.${{ env.APK_SUFFIX }}.apk

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package-version.outputs.version }}-${{ env.APK_SUFFIX }}
          name: Release v${{ steps.package-version.outputs.version }} (${{ env.BUILD_TYPE }})
          body: |
            Automated ${{ env.BUILD_TYPE }} build for version v${{ steps.package-version.outputs.version }}.
            
            构建类型: ${{ github.event.inputs.build_type }}
            ${{ github.event.inputs.enable_debug_tools == 'true' && '🛠️ 调试工具已启用' || '' }}
            
            ## 优化说明
            - ✅ 使用 Node.js 20 和并行构建
            - ✅ Gradle 缓存和配置缓存
            - ✅ Expo prebuild 缓存
            - ✅ 并行 Gradle 任务
          draft: false
          prerelease: ${{ github.event.inputs.build_type == 'debug' }}
          files: artifacts/orionTV.${{ steps.package-version.outputs.version }}.${{ env.APK_SUFFIX }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}